services:
  food-stats:
    container_name: food-stats
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:  # Change IDs
      - PUID=1000
      - PGID=1000
    ports:  # Change host-port (HOST:CONTAINER)
      - 8080:8080
    env_file:
      - stack.env
